<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>claude-memd - Memory Deletion (Port 37778)</title>
  <style>
    :root {
      --color-bg-primary: #ffffff;
      --color-bg-secondary: #f7f7f7;
      --color-text-primary: #1f2328;
      --color-text-secondary: #656d76;
      --color-border-primary: #d0d7de;
      --color-accent-primary: #0969da;
      --color-accent-error: #cf222e;
      --color-accent-success: #1a7f37;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg-primary: #0d1117;
        --color-bg-secondary: #161b22;
        --color-text-primary: #e6edf3;
        --color-text-secondary: #8b949e;
        --color-border-primary: #30363d;
        --color-accent-primary: #58a6ff;
        --color-accent-error: #f85149;
        --color-accent-success: #3fb950;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--color-border-primary);
      margin-bottom: 20px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .subtitle {
      color: var(--color-text-secondary);
      font-size: 14px;
    }

    .stats {
      display: flex;
      gap: 24px;
      font-size: 14px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 600;
    }

    .stat-label {
      color: var(--color-text-secondary);
      font-size: 12px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      padding: 4px;
      background: var(--color-bg-secondary);
      border-radius: 8px;
      width: fit-content;
    }

    .tab {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.15s;
    }

    .tab.active {
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      font-weight: 500;
    }

    .tab:hover:not(.active) {
      color: var(--color-text-primary);
    }

    .project-filter {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 20px;
    }

    .project-filter select {
      padding: 8px 12px;
      border: 1px solid var(--color-border-primary);
      border-radius: 6px;
      background: var(--color-bg-primary);
      color: var(--color-text-primary);
      font-size: 14px;
    }

    .delete-project-btn {
      padding: 8px 12px;
      border: 1px solid var(--color-accent-error);
      border-radius: 6px;
      background: transparent;
      color: var(--color-accent-error);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
    }

    .delete-project-btn:hover {
      background: var(--color-accent-error);
      color: white;
    }

    .card {
      background: var(--color-bg-primary);
      border: 1px solid var(--color-border-primary);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .card-id {
      font-size: 12px;
      color: var(--color-text-secondary);
      font-family: monospace;
    }

    .card-project {
      font-size: 12px;
      color: var(--color-accent-primary);
      background: rgba(9, 105, 218, 0.1);
      padding: 2px 8px;
      border-radius: 12px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .card-text {
      font-size: 13px;
      color: var(--color-text-secondary);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 200px;
      overflow-y: auto;
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--color-border-primary);
    }

    .card-time {
      font-size: 12px;
      color: var(--color-text-secondary);
    }

    .delete-button {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border: 1px solid var(--color-border-primary);
      border-radius: 6px;
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.15s;
    }

    .delete-button:hover {
      background: var(--color-accent-error);
      border-color: var(--color-accent-error);
      color: white;
    }

    .delete-button.confirm {
      background: var(--color-accent-error);
      border-color: var(--color-accent-error);
      color: white;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--color-text-secondary);
    }

    .empty-state h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--color-text-primary);
    }

    .load-more {
      display: block;
      width: 100%;
      padding: 12px;
      border: 1px solid var(--color-border-primary);
      border-radius: 8px;
      background: var(--color-bg-secondary);
      color: var(--color-text-primary);
      cursor: pointer;
      font-size: 14px;
      margin-top: 20px;
    }

    .load-more:hover {
      background: var(--color-bg-primary);
    }

    .load-more:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .confirm-dialog {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .confirm-dialog-content {
      background: var(--color-bg-primary);
      padding: 24px;
      border-radius: 12px;
      max-width: 400px;
      width: 100%;
    }

    .confirm-dialog h3 {
      margin-bottom: 12px;
    }

    .confirm-dialog p {
      color: var(--color-text-secondary);
      margin-bottom: 20px;
    }

    .confirm-dialog-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .confirm-dialog-buttons button {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }

    .btn-cancel {
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border-primary);
      color: var(--color-text-primary);
    }

    .btn-delete {
      background: var(--color-accent-error);
      border: 1px solid var(--color-accent-error);
      color: white;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      z-index: 1001;
      animation: slideIn 0.3s ease;
    }

    .toast.success {
      background: var(--color-accent-success);
    }

    .toast.error {
      background: var(--color-accent-error);
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <h1>claude-memd</h1>
        <p class="subtitle">Memory Deletion Interface (Port 37778)</p>
      </div>
      <div class="stats">
        <div class="stat-item">
          <span class="stat-value" id="stat-observations">-</span>
          <span class="stat-label">Observations</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-summaries">-</span>
          <span class="stat-label">Summaries</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-prompts">-</span>
          <span class="stat-label">Prompts</span>
        </div>
      </div>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="observations">Observations</button>
      <button class="tab" data-tab="summaries">Summaries</button>
      <button class="tab" data-tab="prompts">Prompts</button>
    </div>

    <div class="project-filter">
      <label>Project:</label>
      <select id="project-select">
        <option value="">All Projects</option>
      </select>
      <button class="delete-project-btn" id="delete-project-btn" style="display: none;">
        Delete Project
      </button>
    </div>

    <div id="content"></div>

    <button class="load-more" id="load-more" style="display: none;">Load More</button>
  </div>

  <script>
    const API_BASE = ''; // Same origin
    let currentTab = 'observations';
    let currentProject = '';
    let offset = 0;
    const LIMIT = 20;
    let hasMore = true;
    let projects = [];

    // Tab handling
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        resetAndLoad();
      });
    });

    // Project filter handling
    document.getElementById('project-select').addEventListener('change', (e) => {
      currentProject = e.target.value;
      const deleteBtn = document.getElementById('delete-project-btn');
      deleteBtn.style.display = currentProject ? 'inline-block' : 'none';
      resetAndLoad();
    });

    // Delete project button
    document.getElementById('delete-project-btn').addEventListener('click', () => {
      if (!currentProject) return;
      showConfirmDialog(
        `Delete Project "${currentProject}"?`,
        'This will permanently delete ALL records (observations, summaries, prompts) for this project. This cannot be undone.',
        async () => {
          const response = await fetch(`${API_BASE}/api/project/${encodeURIComponent(currentProject)}/records`, {
            method: 'DELETE'
          });
          if (response.ok) {
            showToast(`Project "${currentProject}" deleted successfully`, 'success');
            currentProject = '';
            document.getElementById('project-select').value = '';
            document.getElementById('delete-project-btn').style.display = 'none';
            loadProjects();
            resetAndLoad();
          } else {
            showToast('Failed to delete project', 'error');
          }
        }
      );
    });

    // Load more button
    document.getElementById('load-more').addEventListener('click', () => {
      if (hasMore) {
        loadData();
      }
    });

    function resetAndLoad() {
      offset = 0;
      hasMore = true;
      document.getElementById('content').innerHTML = '';
      document.getElementById('load-more').style.display = 'none';
      loadData();
    }

    async function loadData() {
      const loadMoreBtn = document.getElementById('load-more');
      loadMoreBtn.disabled = true;
      loadMoreBtn.textContent = 'Loading...';

      try {
        const projectParam = currentProject ? `&project=${encodeURIComponent(currentProject)}` : '';
        const response = await fetch(`${API_BASE}/api/${currentTab}?offset=${offset}&limit=${LIMIT}${projectParam}`);
        const data = await response.json();

        renderData(data);

        hasMore = data.length === LIMIT;
        offset += LIMIT;

        loadMoreBtn.style.display = hasMore ? 'block' : 'none';
      } catch (error) {
        console.error('Failed to load data:', error);
        showToast('Failed to load data', 'error');
      } finally {
        loadMoreBtn.disabled = false;
        loadMoreBtn.textContent = 'Load More';
      }
    }

    function renderData(items) {
      const container = document.getElementById('content');

      if (items.length === 0 && offset === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No ${currentTab} found</h3>
            <p>There are no records to display.</p>
          </div>
        `;
        return;
      }

      items.forEach(item => {
        const card = createCard(item);
        container.appendChild(card);
      });
    }

    function createCard(item) {
      const div = document.createElement('div');
      div.className = 'card';
      div.id = `card-${currentTab.slice(0, -1)}-${item.id}`;

      const title = item.title || item.request || item.prompt_text?.slice(0, 50) || 'Untitled';
      const text = item.text || item.learned || item.prompt_text || '';
      const project = item.project || 'Unknown';
      const time = new Date(item.created_at).toLocaleString();

      div.innerHTML = `
        <div class="card-header">
          <span class="card-id">#${item.id}</span>
          <span class="card-project">${escapeHtml(project)}</span>
        </div>
        <div class="card-title">${escapeHtml(title)}</div>
        <div class="card-text">${escapeHtml(text.slice(0, 500))}${text.length > 500 ? '...' : ''}</div>
        <div class="card-meta">
          <span class="card-time">${time}</span>
          <button class="delete-button" data-id="${item.id}" data-project="${escapeHtml(project)}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            <span class="delete-text">Delete</span>
          </button>
        </div>
      `;

      // Delete button handling
      const deleteBtn = div.querySelector('.delete-button');
      let confirmState = false;

      deleteBtn.addEventListener('click', async () => {
        if (!confirmState) {
          confirmState = true;
          deleteBtn.classList.add('confirm');
          deleteBtn.querySelector('.delete-text').textContent = 'Confirm?';

          // Reset after 3 seconds if not clicked again
          setTimeout(() => {
            if (confirmState) {
              confirmState = false;
              deleteBtn.classList.remove('confirm');
              deleteBtn.querySelector('.delete-text').textContent = 'Delete';
            }
          }, 3000);
        } else {
          const id = deleteBtn.dataset.id;
          const project = deleteBtn.dataset.project;

          try {
            const response = await fetch(`${API_BASE}/api/${currentTab.slice(0, -1)}/${id}`, {
              method: 'DELETE'
            });

            if (response.ok) {
              div.remove();
              showToast(`${currentTab.slice(0, -1)} #${id} deleted`, 'success');
              loadStats();

              // Check if project is now empty
              if (currentProject) {
                checkProjectEmpty(currentProject);
              }
            } else {
              showToast('Failed to delete', 'error');
            }
          } catch (error) {
            console.error('Delete failed:', error);
            showToast('Failed to delete', 'error');
          }

          confirmState = false;
          deleteBtn.classList.remove('confirm');
          deleteBtn.querySelector('.delete-text').textContent = 'Delete';
        }
      });

      return div;
    }

    async function checkProjectEmpty(project) {
      const response = await fetch(`${API_BASE}/api/observations?limit=1&project=${encodeURIComponent(project)}`);
      const data = await response.json();
      if (data.length === 0) {
        // Remove project from select
        const select = document.getElementById('project-select');
        const option = select.querySelector(`option[value="${project}"]`);
        if (option) {
          option.remove();
        }
        if (currentProject === project) {
          currentProject = '';
          select.value = '';
          document.getElementById('delete-project-btn').style.display = 'none';
          loadProjects();
          resetAndLoad();
        }
      }
    }

    async function loadStats() {
      try {
        const response = await fetch(`${API_BASE}/api/stats`);
        const data = await response.json();
        document.getElementById('stat-observations').textContent = data.database.observations;
        document.getElementById('stat-summaries').textContent = data.database.summaries;
        document.getElementById('stat-prompts').textContent = data.database.prompts;
      } catch (error) {
        console.error('Failed to load stats:', error);
      }
    }

    async function loadProjects() {
      try {
        const response = await fetch(`${API_BASE}/api/projects`);
        const data = await response.json();
        projects = data.projects || [];

        const select = document.getElementById('project-select');
        select.innerHTML = '<option value="">All Projects</option>';

        projects.forEach(project => {
          const option = document.createElement('option');
          option.value = project;
          option.textContent = project;
          select.appendChild(option);
        });

        if (currentProject && projects.includes(currentProject)) {
          select.value = currentProject;
        }
      } catch (error) {
        console.error('Failed to load projects:', error);
      }
    }

    function showConfirmDialog(title, message, onConfirm) {
      const dialog = document.createElement('div');
      dialog.className = 'confirm-dialog';
      dialog.innerHTML = `
        <div class="confirm-dialog-content">
          <h3>${escapeHtml(title)}</h3>
          <p>${escapeHtml(message)}</p>
          <div class="confirm-dialog-buttons">
            <button class="btn-cancel">Cancel</button>
            <button class="btn-delete">Delete</button>
          </div>
        </div>
      `;

      dialog.querySelector('.btn-cancel').addEventListener('click', () => {
        dialog.remove();
      });

      dialog.querySelector('.btn-delete').addEventListener('click', async () => {
        dialog.remove();
        await onConfirm();
      });

      document.body.appendChild(dialog);
    }

    function showToast(message, type) {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 3000);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initial load
    loadStats();
    loadProjects();
    loadData();
  </script>
</body>
</html>
